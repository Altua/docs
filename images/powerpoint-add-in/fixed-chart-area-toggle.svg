<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 56" font-family="Segoe UI, system-ui, sans-serif">
  <!-- Background (floater-like) -->
  <rect width="340" height="56" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>

  <!-- Shadow filter -->
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- aspect_ratio icon (simplified) -->
  <rect x="16" y="16" width="24" height="24" rx="3" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <polyline points="20,24 20,20 24,20" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="36,32 36,36 32,36" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Label -->
  <text x="52" y="33" font-size="13" fill="#334155">Fixed chart area</text>

  <!-- Toggle (ON state) -->
  <rect x="268" y="18" width="40" height="20" rx="10" fill="#16a34a"/>
  <circle cx="298" cy="28" r="8" fill="#ffffff"/>
</svg>